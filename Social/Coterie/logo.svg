<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%"  stop-color="#b8d8ff"/>
      <stop offset="50%" stop-color="#4a9eff"/>
      <stop offset="100%" stop-color="#1a4a90"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#0d0d0d"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="92" height="92" rx="17" fill="none"
        stroke="#4a9eff" stroke-width="0.8" stroke-opacity="0.35"/>

  <!--
    Three interlocked rings: A (left) in front of B (middle), B in front of C (right).
    Rings: A cx=30, B cx=50, C cx=70 — all cy=50, r=16.
    A–B intersect at x=40, y=±12.5 from cy  →  (40, 37.5) and (40, 62.5)
    B–C intersect at x=60, y=±12.5 from cy  →  (60, 37.5) and (60, 62.5)

    Each ring only draws its visible arc (the portion not hidden behind the ring in front):
      C: large clockwise arc from (60,37.5) → right side of C → (60,62.5)
      B: large clockwise arc from (40,37.5) → right side of B → (40,62.5)
      A: full circle (frontmost, nothing hides it)
  -->

  <!-- Ring C — rightmost, drawn first (backmost layer) -->
  <path d="M 60 37.5 A 16 16 0 1 1 60 62.5"
        fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="butt"/>

  <!-- Ring B — middle layer; right arc visible, left arc hidden behind A -->
  <path d="M 40 37.5 A 16 16 0 1 1 40 62.5"
        fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="butt"/>

  <!-- Ring A — leftmost, drawn last (frontmost layer), full circle -->
  <circle cx="30" cy="50" r="16"
          fill="none" stroke="url(#gold)" stroke-width="3.5"/>
</svg>
