<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#0f172a"/>

  <!-- 1. Back half of portal ring (top arc — far side) -->
  <path d="M 24 62 A 26 10 0 0 1 76 62"
        stroke="#3b82f6" stroke-width="11" fill="none" stroke-linecap="round"/>

  <!-- 2. Arrow shaft + solid arrowhead (between the two ring halves) -->
  <line x1="50" y1="12" x2="50" y2="59"
        stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
  <polygon points="50,76 37,53 63,53" fill="#f97316"/>

  <!-- 3. Front half of portal ring (bottom arc — near side, on top of arrow) -->
  <path d="M 24 62 A 26 10 0 0 0 76 62"
        stroke="#3b82f6" stroke-width="11" fill="none" stroke-linecap="round"/>

</svg>
